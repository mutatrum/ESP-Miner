<ng-container *ngIf="root">
    <div class="layout-menuitem-root-text">{{item.label}}</div>
</ng-container>

<a *ngIf="(!item.routerLink || item.items) && item.visible !== false && !item.separator" [attr.href]="item.url" (click)="itemClick($event)"
   [ngClass]="item.class" [attr.target]="item.target" tabindex="0" pRipple>
    <i [ngClass]="item.icon" class="layout-menuitem-icon"></i>
    <span class="layout-menuitem-text">{{item.label}}</span>
    <i class="pi pi-fw pi-angle-down layout-submenu-toggler" *ngIf="item.items"></i>
</a>
<a *ngIf="(item.routerLink && !item.items) && item.visible !== false && !item.separator" (click)="itemClick($event)" [ngClass]="item.class"
   [routerLink]="item.routerLink" routerLinkActive="active-route" [routerLinkActiveOptions]="item.routerLinkActiveOptions||{ paths: 'exact', queryParams: 'ignored', matrixParams: 'ignored', fragment: 'ignored' }"
   [fragment]="item.fragment" [queryParamsHandling]="item.queryParamsHandling" [preserveFragment]="item.preserveFragment"
   [skipLocationChange]="item.skipLocationChange" [replaceUrl]="item.replaceUrl" [state]="item.state" [queryParams]="item.queryParams"
   [attr.target]="item.target" tabindex="0" pRipple>
    <i [ngClass]="item.icon" class="layout-menuitem-icon"></i>
    <span class="layout-menuitem-text">{{item.label}}</span>
    <i class="pi pi-fw pi-angle-down layout-submenu-toggler" *ngIf="item.items"></i>
</a>

<ul *ngIf="item.items && item.visible !== false" [@children]="submenuAnimation">
    <ng-container *ngFor="let child of item.items; let i = index">
        <li app-menuitem *ngIf="!child.separator && !child.image" [item]="child" [index]="i" [parentKey]="key" [class]="child.badgeClass"></li>
        <li *ngIf="child.separator" class="menu-separator block h-1rem"></li>
        <li *ngIf="child.image">
            <img [src]="child.image" alt="Logo" class="w-full" />
        </li>
    </ng-container>
</ul>
